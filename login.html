<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 20%, rgba(89, 141, 213, 0.35), transparent 28%),
        radial-gradient(circle at 15% 85%, rgba(120, 190, 255, 0.25), transparent 24%),
        radial-gradient(circle at 40% 50%, rgba(255, 255, 255, 0.08), transparent 32%),
        linear-gradient(135deg, #78a0e7 0%, #1d66da 45%, #2a7cf2 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      left: -120px;
      bottom: -120px;
      width: 520px;
      height: 320px;
      background:
        radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 2px);
      background-size: 18px 18px;
      opacity: 0.18;
      transform: rotate(-12deg);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      left: -80px;
      bottom: 35px;
      width: 700px;
      height: 280px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        0 0 0 40px rgba(255,255,255,0.04),
        0 0 0 80px rgba(255,255,255,0.03);
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 25, 90, 0.35);
      position: relative;
      z-index: 1;
      min-height: auto;
    }

    .left-panel {
      flex: 1;
      color: white;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      min-height: 500px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      backdrop-filter: blur(2px);
    }

    .left-panel .icon-card {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.45);
      font-size: 60px;
      box-shadow:
        0 0 24px rgba(255,255,255,0.35),
        inset 0 0 18px rgba(255,255,255,0.18);
      font-size: 64px;
    }

    .pill {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 999px;
      color: #e8f1ff;
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 28px;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(14, 71, 176, 0.35);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .left-panel h1 {
      font-size: clamp(32px, 8vw, 68px);
      line-height: 1.1;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.16);
    }

    .left-panel p {
      max-width: 500px;
      font-size: clamp(16px, 3vw, 24px);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
      margin-bottom: 30px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .feature-list {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feature {
      padding: 16px 28px;
      border-radius: 16px;
      font-size: 17px;
      color: #eef6ff;
      border: 2px solid rgba(126, 213, 255, 0.45);
      background: linear-gradient(180deg, rgba(73, 154, 255, 0.3), rgba(40, 112, 220, 0.22));
      box-shadow:
        0 0 16px rgba(91, 188, 255, 0.18),
        inset 0 0 10px rgba(255,255,255,0.08);
    }

    .right-panel {
      flex: 1;
      padding: 50px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 500px;
      background:
        linear-gradient(135deg, rgba(248,249,255,0.96), rgba(239,242,252,0.98));
    }

    .right-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 0% 0%, rgba(130, 150, 220, 0.12), transparent 32%),
        linear-gradient(150deg, transparent 0%, transparent 20%, rgba(255,255,255,0.45) 38%, transparent 50%, transparent 100%);
      pointer-events: none;
    }

    .login-box {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .login-box h2 {
      text-align: center;
      font-size: clamp(32px, 8vw, 64px);
      line-height: 1.1;
      color: #3f495f;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: #697287;
      font-size: clamp(14px, 2vw, 18px);
      margin-bottom: 35px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #232a39;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      height: 56px;
      border-radius: 12px;
      border: 2px solid #d7ddea;
      background: rgba(255,255,255,0.75);
      padding: 0 16px;
      font-size: 15px;
      color: #374151;
      outline: none;
      box-shadow: 0 8px 16px rgba(68, 85, 130, 0.04);
      transition: 0.25s ease;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #4f8dff;
      box-shadow: 0 0 0 4px rgba(79, 141, 255, 0.12);
    }

    .input-group input::placeholder {
      color: #a0a8b8;
    }

    .btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #1d56bf 0%, #2f7cff 100%);
      box-shadow: 0 12px 24px rgba(40, 110, 230, 0.24);
      transition: 0.25s ease;
      margin-top: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 34px rgba(40, 110, 230, 0.34);
    }

    #errorMsg {
      min-height: 24px;
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #d62828;
      font-weight: 600;
    }

    .footer {
      margin-top: 34px;
      text-align: center;
      color: #8c95a9;
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .left-panel,
      .right-panel {
        width: 100%;
        min-height: auto;
        padding: 35px 20px;
      }

      body::before,
      body::after {
        display: none;
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 10px;
      }

      .container {
        border-radius: 16px;
      }

      .left-panel,
      .right-panel {
        padding: 25px 15px;
      }

      .left-panel .icon-card {
        width: 90px;
        height: 90px;
        font-size: 40px;
      }

      .feature-list {
        flex-direction: column;
        gap: 8px;
      }

      .feature {
        font-size: 12px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div class="icon-card">📊</div>
      <div class="pill">SMART QR ATTENDANCE</div>

      <h1>Smart Attendance</h1>

      <p>
        Track attendance quickly and professionally with a secure QR-based
        system for both students and instructors.
      </p>

      <div class="feature-list">
        <div class="feature">⚡ Fast Login</div>
        <div class="feature">🗂 QR Scanning</div>
        <div class="feature">📋 Live Records</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="login-box">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue to your dashboard</p>

        <div class="input-group" id="firstNameGroup" style="display: none;">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Enter your first name" />
        </div>

        <div class="input-group" id="lastNameGroup" style="display: none;">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Enter your last name" />
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="input-group">
          <label for="role">Role</label>
          <select id="role" onchange="toggleNameFields()">
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
          </select>
        </div>

        <button class="btn" onclick="login()">Sign In</button>

        <p id="errorMsg"></p>
        <div class="footer">Smart Attendance System</div>
      </div>
    </div>
  </div>

  <script>
    function toggleNameFields() {
      const role = document.getElementById("role").value;
      const firstNameGroup = document.getElementById("firstNameGroup");
      const lastNameGroup = document.getElementById("lastNameGroup");

      if (role === "student") {
        firstNameGroup.style.display = "block";
        lastNameGroup.style.display = "block";
      } else {
        firstNameGroup.style.display = "none";
        lastNameGroup.style.display = "none";
      }
    }

    // Show name fields on page load if student is selected
    window.addEventListener("DOMContentLoaded", () => {
      toggleNameFields();
    });

    async function login() {
      const email = document.getElementById("email").value;
      const role = document.getElementById("role").value;
      const firstName = document.getElementById("firstName").value;
      const lastName = document.getElementById("lastName").value;
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.innerText = "";

      if (!email) {
        errorMsg.innerText = "Please enter email.";
        return;
      }

      if (role === "student" && (!firstName || !lastName)) {
        errorMsg.innerText = "Please enter first and last name.";
        return;
      }

      try {
        const loginData = { email, role };
        if (role === "student") {
          loginData.firstName = firstName;
          loginData.lastName = lastName;
        }
        console.log("Logging in with:", loginData);
        const res = await fetch("http://localhost:3000/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(loginData)
        });

        const data = await res.json();
        console.log("Login response:", data);

        if (data.success) {
          const userData = { id: data.userId, email, role };
          if (role === "student") {
            userData.firstName = firstName;
            userData.lastName = lastName;
          }
          console.log("Setting user to:", userData);
          localStorage.setItem("user", JSON.stringify(userData));

          if (role === "instructor") {
            window.location.href = "instructor.html";
          } else {
            window.location.href = "student.html";
          }
        } else {
          errorMsg.innerText = data.message;
        }
      } catch (error) {
        console.error("Login error:", error);
        errorMsg.innerText = "Server error. Is backend running?";
      }
    }
  </script>
</body>
</html>
