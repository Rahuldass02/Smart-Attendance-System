<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Attendance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.22), transparent 26%),
        radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.20), transparent 28%),
        linear-gradient(135deg, #2b237c 0%, #3f35b5 55%, #2f2a8c 100%);
    }

    .container {
      width: 1180px;
      max-width: 100%;
      min-height: 660px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 30px 80px rgba(16, 24, 40, 0.28);
    }

    .left {
      flex: 1.12;
      position: relative;
      background: linear-gradient(180deg, #eef2ff 0%, #e7ebff 100%);
      padding: 70px 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .left::before,
    .left::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.08);
    }

    .left::before {
      width: 260px;
      height: 260px;
      top: -90px;
      left: -70px;
    }

    .left::after {
      width: 240px;
      height: 240px;
      bottom: -85px;
      right: -70px;
    }

    .left-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 430px;
    }

    .icon-card {
      width: 136px;
      height: 136px;
      margin: 0 auto 28px;
      border-radius: 34px;
      background: linear-gradient(145deg, #ffffff, #dfe7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 18px 35px rgba(99, 102, 241, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      font-size: 60px;
    }

    .badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(79, 70, 229, 0.10);
      color: #4f46e5;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4px;
      margin-bottom: 22px;
    }

    .left h1 {
      font-size: 56px;
      line-height: 1.05;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 22px;
    }

    .left p {
      font-size: 20px;
      line-height: 1.8;
      color: #5b6480;
      margin-bottom: 34px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .feature {
      padding: 12px 18px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.05);
    }

    .right {
      flex: 0.96;
      background: #fcfcff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 70px 55px;
    }

    .login-box {
      width: 100%;
      max-width: 390px;
    }

    .login-box h2 {
      font-size: 58px;
      line-height: 1;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
      margin-bottom: 14px;
    }

    .subtitle {
      text-align: center;
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 38px;
    }

    .input-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 9px;
    }

    input,
    select {
      width: 100%;
      padding: 18px 18px;
      border-radius: 16px;
      border: 1.5px solid #d8dbe7;
      background: #ffffff;
      font-size: 17px;
      color: #111827;
      outline: none;
      transition: 0.25s ease;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus,
    select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
      transform: translateY(-1px);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      color: white;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 18px 34px rgba(79, 70, 229, 0.28);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 38px rgba(79, 70, 229, 0.36);
    }

    .btn:active {
      transform: translateY(0);
    }

    #errorMsg {
      min-height: 24px;
      margin-top: 16px;
      text-align: center;
      color: #dc2626;
      font-size: 14px;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      margin-top: 26px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .container {
        flex-direction: column;
      }

      .left,
      .right {
        width: 100%;
      }

      .left {
        padding: 50px 28px 36px;
      }

      .right {
        padding: 38px 24px 46px;
      }

      .left h1 {
        font-size: 42px;
      }

      .left p {
        font-size: 17px;
      }

      .login-box h2 {
        font-size: 42px;
      }

      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="left">
      <div class="left-content">
        <div class="icon-card">📊</div>
        <div class="badge">SMART QR ATTENDANCE</div>

        <h1>Smart<br>Attendance</h1>

        <p>
          Track attendance quickly and professionally with a secure QR-based
          system for both students and instructors.
        </p>

        <div class="features">
          <div class="feature">Fast Login</div>
          <div class="feature">QR Scanning</div>
          <div class="feature">Live Records</div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="login-box">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue to your dashboard</p>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="input-group">
          <label for="role">Role</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
          </select>
        </div>

        <button class="btn" onclick="login()">Sign In</button>

        <p id="errorMsg"></p>
        <div class="footer">Smart Attendance System</div>
      </div>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const role = document.getElementById("role").value;
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.innerText = "";

      if (!email) {
        errorMsg.innerText = "Please enter email.";
        return;
      }

      try {
        const res = await fetch("http://10.0.0.65:3000/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, role })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem("user", JSON.stringify(data.user));

          if (role === "instructor") {
            window.location.href = "instructor.html";
          } else {
            window.location.href = "student.html";
          }
        } else {
          errorMsg.innerText = data.message;
        }
      } catch (error) {
        errorMsg.innerText = "Server error. Is backend running?";
      }
    }
  </script>

</body>
</html>
