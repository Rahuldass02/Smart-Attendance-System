<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(90, 160, 255, 0.35), transparent 28%),
        radial-gradient(circle at 15% 85%, rgba(120, 190, 255, 0.25), transparent 24%),
        radial-gradient(circle at 40% 50%, rgba(255, 255, 255, 0.08), transparent 32%),
        linear-gradient(135deg, #0b3f9c 0%, #1d66da 45%, #2a7cf2 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      left: -120px;
      bottom: -120px;
      width: 520px;
      height: 320px;
      background:
        radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 2px);
      background-size: 18px 18px;
      opacity: 0.18;
      transform: rotate(-12deg);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      left: -80px;
      bottom: 40px;
      width: 700px;
      height: 280px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        0 0 0 40px rgba(255,255,255,0.04),
        0 0 0 80px rgba(255,255,255,0.03);
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .container {
      width: 1200px;
      max-width: 92%;
      min-height: 700px;
      display: flex;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 25, 90, 0.35);
      position: relative;
      z-index: 1;
    }

    .left-panel {
      flex: 1;
      color: white;
      padding: 70px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      backdrop-filter: blur(2px);
    }

    .left-panel .icon-card {
      width: 150px;
      height: 150px;
      border-radius: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.45);
      box-shadow:
        0 0 24px rgba(255,255,255,0.35),
        inset 0 0 18px rgba(255,255,255,0.18);
      font-size: 64px;
    }

    .pill {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 999px;
      color: #e8f1ff;
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 28px;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(14, 71, 176, 0.35);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .left-panel h1 {
      font-size: 68px;
      line-height: 1.05;
      font-weight: 700;
      margin-bottom: 22px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.16);
    }

    .left-panel p {
      max-width: 560px;
      font-size: 24px;
      line-height: 1.7;
      color: rgba(255,255,255,0.92);
      margin-bottom: 46px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .feature-list {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feature {
      padding: 16px 28px;
      border-radius: 16px;
      font-size: 17px;
      color: #eef6ff;
      border: 2px solid rgba(126, 213, 255, 0.45);
      background: linear-gradient(180deg, rgba(73, 154, 255, 0.3), rgba(40, 112, 220, 0.22));
      box-shadow:
        0 0 16px rgba(91, 188, 255, 0.18),
        inset 0 0 10px rgba(255,255,255,0.08);
    }

    .right-panel {
      flex: 0.92;
      padding: 70px 70px 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background:
        linear-gradient(135deg, rgba(248,249,255,0.96), rgba(239,242,252,0.98));
    }

    .right-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 0% 0%, rgba(130, 150, 220, 0.12), transparent 32%),
        linear-gradient(150deg, transparent 0%, transparent 20%, rgba(255,255,255,0.45) 38%, transparent 50%, transparent 100%);
      pointer-events: none;
    }

    .login-box {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .login-box h2 {
      text-align: center;
      font-size: 64px;
      line-height: 1.05;
      color: #3f495f;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: #697287;
      font-size: 18px;
      margin-bottom: 54px;
    }

    .input-group {
      margin-bottom: 28px;
    }

    .input-group label {
      display: block;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #232a39;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      height: 68px;
      border-radius: 16px;
      border: 2px solid #d7ddea;
      background: rgba(255,255,255,0.75);
      padding: 0 22px;
      font-size: 17px;
      color: #374151;
      outline: none;
      box-shadow: 0 10px 22px rgba(68, 85, 130, 0.05);
      transition: 0.25s ease;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #4f8dff;
      box-shadow: 0 0 0 4px rgba(79, 141, 255, 0.12);
    }

    .input-group input::placeholder {
      color: #a0a8b8;
    }

    .btn {
      width: 100%;
      height: 72px;
      border: none;
      border-radius: 16px;
      font-size: 22px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #1d56bf 0%, #2f7cff 100%);
      box-shadow: 0 18px 30px rgba(40, 110, 230, 0.28);
      transition: 0.25s ease;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 34px rgba(40, 110, 230, 0.34);
    }

    #errorMsg {
      min-height: 24px;
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #d62828;
      font-weight: 600;
    }

    .footer {
      margin-top: 34px;
      text-align: center;
      color: #8c95a9;
      font-size: 15px;
    }

    @media (max-width: 980px) {
      .container {
        flex-direction: column;
        min-height: auto;
      }

      .left-panel,
      .right-panel {
        width: 100%;
      }

      .left-panel {
        padding: 50px 28px 40px;
      }

      .right-panel {
        padding: 40px 24px 36px;
      }

      .left-panel h1 {
        font-size: 46px;
      }

      .left-panel p {
        font-size: 18px;
      }

      .login-box h2 {
        font-size: 46px;
      }

      .subtitle {
        font-size: 16px;
        margin-bottom: 34px;
      }
    }

    @media (max-width: 600px) {
      .container {
        max-width: 96%;
        border-radius: 22px;
      }

      .left-panel h1 {
        font-size: 38px;
      }

      .left-panel p {
        font-size: 16px;
      }

      .feature {
        font-size: 14px;
        padding: 12px 18px;
      }

      .login-box h2 {
        font-size: 38px;
      }

      .input-group input,
      .input-group select,
      .btn {
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div class="icon-card">📊</div>
      <div class="pill">SMART QR ATTENDANCE</div>

      <h1>Smart Attendance</h1>

      <p>
        Track attendance quickly and professionally with a secure QR-based
        system for both students and instructors.
      </p>

      <div class="feature-list">
        <div class="feature">⚡ Fast Login</div>
        <div class="feature">🗂 QR Scanning</div>
        <div class="feature">📋 Live Records</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="login-box">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue to your dashboard</p>

        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="input-group">
          <label for="role">Role</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
          </select>
        </div>

        <button class="btn" onclick="login()">Sign In</button>

        <p id="errorMsg"></p>
        <div class="footer">Smart Attendance System</div>
      </div>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const role = document.getElementById("role").value;
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.innerText = "";

      if (!email) {
        errorMsg.innerText = "Please enter email.";
        return;
      }

      try {
        console.log("Logging in with:", { email, role });
        const res = await fetch("http://localhost:3000/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, role })
        });

        const data = await res.json();
        console.log("Login response:", data);

        if (data.success) {
          console.log("Setting user to:", { id: data.userId, email, role });
          localStorage.setItem("user", JSON.stringify({
            id: data.userId,
            email,
            role
          }));

          if (role === "instructor") {
            window.location.href = "instructor.html";
          } else {
            window.location.href = "student.html";
          }
        } else {
          errorMsg.innerText = data.message;
        }
      } catch (error) {
        console.error("Login error:", error);
        errorMsg.innerText = "Server error. Is backend running?";
      }
    }
  </script>
</body>
</html>
